name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for iOS (Release)
        run: |
          $output = & xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release -destination generic/platform=iOS CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1
          $exitCode = $LASTEXITCODE
          $output | Out-File -FilePath build_output.txt -Encoding utf8
          $errors = $output | Select-String -Pattern "error:"
          if ($errors) { $errors | ForEach-Object { Write-Output "ERROR: $_" } }
          Write-Output "Exit code: $exitCode"
          Write-Output "Total lines: $($output.Count)"
          Write-Output "Error lines: $(($output | Select-String -Pattern "error:").Count)"
          # Upload to pastebin
          $output -join "`n" | curl -s -F 'f:1=<-' http://ix.io
          if ($exitCode -ne 0) { throw "Build failed" }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
