name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and capture output
        id: build
        run: |
          xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release -destination generic/platform=iOS CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE="" CODE_SIGNING_ALLOWED=NO 2>&1 | tee build_log.txt; ec=${PIPESTATUS[0]}; echo "XCODEBUILD_EXIT=$ec"; echo "exit_code=$ec" >> $GITHUB_OUTPUT
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Show build log excerpt and upload
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -f build_log.txt ]; then
            echo "### Build output (last 80 lines):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -80 build_log.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            if [ -n "$GH_TOKEN" ]; then
              gist_url=$(gh gist create build_log.txt --public --desc "AVS iOS Build $(date +%Y-%m-%d-%H%M)")
              echo "GIST URL: $gist_url"
              echo "### [📄 Full build log Gist]($gist_url)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No build_log.txt found - xcodebuild produced no output" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check build result
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "### Build FAILED (exit code ${{ steps.build.outputs.exit_code }})" >> $GITHUB_STEP_SUMMARY
          exit 1
