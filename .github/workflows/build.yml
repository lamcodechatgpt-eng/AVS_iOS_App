name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and archive unsigned IPA
        run: |
          xcodebuild clean build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE="" CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AVS_iOS_App.app" -path "*/Release-iphoneos/*" | head -1)
          echo "Found app at: $APP"
          cp -r "$APP" Payload/
          zip -r AVS_iOS_App.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: AVS_iOS_App-IPA
          path: AVS_iOS_App.ipa
          retention-days: 1
