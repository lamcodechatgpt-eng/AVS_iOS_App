name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Test 1 - minimal build (no flags)
        continue-on-error: true
        run: |
          xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App 2>&1 | tee build1.txt; ec1=${PIPESTATUS[0]}; echo "EC1=$ec1" >> $GITHUB_STEP_SUMMARY

      - name: Test 2 - with CODE_SIGNING_REQUIRED=NO
        continue-on-error: true
        run: |
          xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App CODE_SIGNING_REQUIRED=NO 2>&1 | tee build2.txt; ec2=${PIPESTATUS[0]}; echo "EC2=$ec2" >> $GITHUB_STEP_SUMMARY

      - name: Test 3 - with deployment target check
        if: always()
        run: |
          for f in build1.txt build2.txt; do
            if [ -f "$f" ]; then
              echo "=== $f ===" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -i "error\|BUILD\|failed\|fatal" "$f" | tail -20 >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              wc -c "$f" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload logs to Gist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          for f in build1.txt build2.txt; do
            if [ -f "$f" ] && [ -n "$GH_TOKEN" ]; then
              echo "Uploading $f ($(wc -c < $f) bytes)..."
              url=$(gh gist create "$f" --public --desc "AVS build log $f $(date +%H%M%S)" 2>&1)
              echo "Gist for $f: $url"
              echo "$f -> $url" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "Done uploading gists"
