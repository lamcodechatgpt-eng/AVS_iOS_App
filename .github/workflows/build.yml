name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show environment versions
        run: |
          echo "Xcode: $(xcodebuild -version)"
          echo "xcodegen: $(xcodegen --version)"
          echo "Swift: $(swift --version)"

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build
        run: xcodebuild clean build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE="" CODE_SIGNING_ALLOWED=NO
