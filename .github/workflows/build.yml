name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build unsigned IPA
        run: |
          xcodebuild clean archive -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release -archivePath AVS_iOS_App.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE="" CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r AVS_iOS_App.xcarchive/Products/Applications/AVS_iOS_App.app Payload/
          zip -r AVS_iOS_App.ipa Payload
          
      - name: Upload IPA (Bypass GitHub Storage Limit)
        run: |
          echo "Uploading to GoFile.io..."
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          curl -s -F "file=@AVS_iOS_App.ipa" https://${SERVER}.gofile.io/uploadFile || true
          echo ""
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: AVS_iOS_App-IPA
          path: AVS_iOS_App.ipa
          retention-days: 1
