name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and capture output
        id: build
        run: |
          $output = & xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE="" CODE_SIGNING_ALLOWED=NO 2>&1
          $ec = $LASTEXITCODE
          $output | Out-File -FilePath build_log.txt -Encoding utf8
          Write-Output "exit_code=$ec" >> $env:GITHUB_OUTPUT
          # Print summary for annotations
          $output | Select-String -Pattern "error:|BUILD|FATAL|failed" | ForEach-Object { Write-Output ">> $($_.Line)" }

      - name: Upload log to Gist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if ($env:GH_TOKEN) {
            $gist = gh gist create build_log.txt --public --desc "AVS iOS Build $(Get-Date -Format yyyy-MM-dd-HHmm)"
            Write-Output "GIST: $gist"
            "### [Build Log Gist]($gist)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          } else {
            Write-Output "No GH_TOKEN secret set, skipping gist upload"
          }

      - name: Check build result
        if: steps.build.outputs.exit_code != '0'
        run: |
          "### Build FAILED (exit code ${{ steps.build.outputs.exit_code }})" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          exit 1
