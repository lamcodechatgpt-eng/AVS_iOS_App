name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build (macOS default, no destination)
        run: |
          $output = & xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1
          Write-Output "Exit: $LASTEXITCODE"
          $output | Select-String -Pattern "error:|BUILD" | ForEach-Object { $_.Line }

      - name: Try with iphoneos sdk
        run: |
          $output = & xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release -sdk iphoneos CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1
          $ec = $LASTEXITCODE
          Write-Output "--- Exit: $ec ---"
          $output | Select-String -Pattern "error:|BUILD" | ForEach-Object { $_.Line }
          if ($ec -ne 0) { throw "Build2 failed" }

      - name: Package IPA
        if: success()
        run: |
          echo "Build succeeded!"
