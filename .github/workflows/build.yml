name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build and package
        id: build
        run: |
          xcodebuild clean build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE="" CODE_SIGNING_ALLOWED=NO 2>&1 | tee build_log.txt
          ec=${PIPESTATUS[0]}
          echo "exit_code=$ec" >> $GITHUB_OUTPUT
          if [ $ec -ne 0 ]; then
            echo "BUILD FAILED ($ec)"
            exit $ec
          fi
          mkdir -p Payload
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AVS_iOS_App.app" -path "*/Release-iphoneos/*" | head -1)
          cp -r "$APP" Payload/
          zip -r AVS_iOS_App.ipa Payload

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AVS_iOS_App-IPA
          path: AVS_iOS_App.ipa
          retention-days: 1
