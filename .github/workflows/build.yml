name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for iOS (Release)
        run: |
          $output = & xcodebuild build -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -configuration Release -destination generic/platform=iOS CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath build_output.txt
          if ($exitCode -ne 0) { throw "Build failed with exit code $exitCode" }

      - name: Package IPA
        if: success()
        run: |
          $app = & xcodebuild -project AVS_iOS_App.xcodeproj -scheme AVS_iOS_App -showBuildSettings -destination generic/platform=iOS CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | Select-String "BUILT_PRODUCTS_DIR" | ForEach-Object { $_.Line.Split("=")[1].Trim() }
          $appPath = Join-Path $app "AVS_iOS_App.app"
          Write-Output "App path: $appPath"
          mkdir -p Payload
          Copy-Item -Recurse -Path $appPath -Destination Payload/
          Compress-Archive -Path Payload -DestinationPath AVS_iOS_App.zip
          Rename-Item AVS_iOS_App.zip AVS_iOS_App.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AVS_iOS_App-IPA
          path: AVS_iOS_App.ipa
          retention-days: 1
